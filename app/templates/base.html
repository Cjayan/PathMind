<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}路径智慧库{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="/" class="nav-brand">路径智慧库</a>
            {% block breadcrumb %}{% endblock %}
        </div>
        <div class="nav-center">
            <div class="search-wrapper">
                <input type="text" class="search-input" id="global-search"
                       placeholder="搜索描述、备注、解决方案..." autocomplete="off">
                <select class="search-field-filter" id="search-field">
                    <option value="all">全部</option>
                    <option value="description">描述</option>
                    <option value="notes">备注</option>
                    <option value="solution">解决方案</option>
                </select>
                <div class="search-dropdown" id="search-dropdown"></div>
            </div>
        </div>
        <div class="nav-right">
            <a href="/" class="nav-link">首页</a>
            <a href="/flows" class="nav-link">全部流程</a>
            <a href="/settings" class="nav-link">设置</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <div id="toast-container"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
